# Visual tokens for md-to-pdf (ReportLab). Fonts: TTF/OTF are not bundled — see brand_kits/README.md.
colors:
  brand: "#0f4c81"
  body: "#1f2937"
  muted: "#6b7280"
  table_header_bg: "#f3f4f6"
  table_grid: "#d1d5db"
  table_fin_negative: "#dc2626"
  issuer_title: "#374151"
  issuer_body: "#6b7280"
  issuer_card_bg: "#f8fafc"
  issuer_card_border: "#dbe3ea"

typography:
  footer_confidential_pt: 7
  footer_page_num_pt: 8
  header_generated_pt: 8
  issuer_title_pt: 9
  issuer_body_pt: 8

# Doc body, header "Generated", pypdf footer (confidential + Page n), and Mermaid (CSS) all use
# the same family: see fonts/NotoSansSC-*.ttf (registered in register_fonts() as these names).
fonts:
  footer_face: "IDS-Noto-Regular"
  header_generated_face: "IDS-Noto-Regular"

assets:
  logo: "logo.png"
  icon: "icon.png"

layout:
  logo_header_height_pt: 34
  logo_header_width_scale: 4.0
