name: CI

on:
  push:
    branches: ["main", "plan-*"]
  pull_request:
    branches: ["main"]
  # Allow manual trigger of the full CI (including the gated `golden` job
  # that normally runs only on push-to-main).
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check src/ tests/
      - name: mypy
        run: mypy --strict src/mdpdf

  test:
    name: "py${{ matrix.python-version }} / ${{ matrix.os }}"
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # libcairo (cairosvg's native dep) per-OS. Tests skip on systems
      # without it, so this is best-effort to maximise coverage.
      - name: Install libcairo (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y libcairo2

      - name: Install libcairo (macOS)
        if: runner.os == 'macOS'
        run: brew install cairo

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: pytest
        # PYTHONUTF8=1 makes Path.read_text / write_text default to UTF-8 on
        # Windows (Western locales default to CP1252 otherwise). Tests write
        # content like `·` (U+00B7) and CJK strings without explicit encoding=
        # — they would round-trip fine on Linux/macOS but fail on Windows.
        env:
          PYTHONUTF8: "1"
        run: python -m pytest -v --cov=src/mdpdf --cov-report=term-missing

  # Golden harness + UAT integration runs only on push-to-main. The Kroki
  # Docker service consumes Actions minutes faster than plain runners, and
  # the parity gate is a post-merge check rather than a per-PR gate. Run
  # the same job manually via workflow_dispatch when verifying a PR
  # locally is not enough.
  #
  # Linux-only because Kroki is a Docker service (Linux-only on
  # GitHub-hosted runners). Per pass-1 P5-003, the kroki service block is
  # NOT placed inside the matrix job — the empty-string image expression
  # crashes non-Linux runners with "image cannot be blank".
  golden:
    name: Golden + UAT (ubuntu / py3.12 / kroki)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest
    services:
      kroki:
        image: yuzutech/kroki:latest
        ports:
          - 8000:8000
        options: >-
          --health-cmd "wget -qO- http://localhost:8000/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      KROKI_URL: "http://localhost:8000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install libcairo
        run: sudo apt-get update -y && sudo apt-get install -y libcairo2
      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"
      - name: Run golden harness + UAT suite
        run: |
          python -m pytest tests/golden/ -v
          python -m pytest tests/integration/test_comprehensive_uat.py -v
