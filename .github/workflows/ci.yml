name: CI

on:
  push:
    branches: ["main", "plan-*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lint:
    name: Lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: ruff check
        run: ruff check src/ tests/
      - name: mypy
        run: mypy --strict src/mdpdf

  test:
    name: "py${{ matrix.python-version }} / ${{ matrix.os }}"
    needs: lint
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # libcairo (cairosvg's native dep) per-OS. Tests skip on systems
      # without it, so this is best-effort to maximise coverage.
      - name: Install libcairo (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y libcairo2

      - name: Install libcairo (macOS)
        if: runner.os == 'macOS'
        run: brew install cairo

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      - name: pytest
        run: python -m pytest -v --cov=src/mdpdf --cov-report=term-missing

  # Golden harness + UAT integration job runs only on Linux because Kroki
  # is provided as a Docker service (Linux-only on GitHub-hosted runners).
  # Per pass-1 P5-003 the kroki service block is NOT placed inside the
  # matrix job — the empty-string image expression crashes non-Linux
  # runners with "image cannot be blank".
  golden:
    name: Golden + UAT (ubuntu / py3.12 / kroki)
    needs: test
    runs-on: ubuntu-latest
    services:
      kroki:
        image: yuzutech/kroki:latest
        ports:
          - 8000:8000
        options: >-
          --health-cmd "wget -qO- http://localhost:8000/health || exit 1"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      KROKI_URL: "http://localhost:8000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install libcairo
        run: sudo apt-get update -y && sudo apt-get install -y libcairo2
      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"
      - name: Run golden harness + UAT suite
        run: |
          python -m pytest tests/golden/ -v
          python -m pytest tests/integration/test_comprehensive_uat.py -v
