# One-shot helper: regenerate Linux-only deterministic sha256 baselines
# and commit them back to the target branch.
#
# Why this exists:
#   tests/golden/test_deterministic_sha256.py is decorated with
#   @pytest.mark.skipif(not sys.platform.startswith("linux")) because
#   PDF byte content varies per-OS (font rasterisation, ReportLab impl
#   details). The canonical platform for the byte-identical contract is
#   Linux. Developers on macOS/Windows cannot generate these baselines
#   locally — this workflow bridges that gap.
#
# How to use:
#   1. Push a branch with new fixtures or render-pipeline changes.
#   2. Open the GitHub Actions UI, pick "Autofill Linux baselines",
#      run workflow on your branch.
#   3. The workflow regenerates the sha256 baselines and pushes them
#      as a github-actions[bot] commit on the same branch.
#   4. Pull the bot commit locally; CI's acceptance gate now passes.
#
# Manual-only on purpose: workflow_dispatch is the single trigger.
# An automatic trigger would let any PR's first push regenerate
# baselines and silently mask a real determinism regression. Manual
# invocation makes "I am intentionally accepting these new bytes"
# explicit.
#
# Security note: this workflow has contents:write so it can push back.
# That permission is constrained to:
#   - the manually-specified branch (defaults to current spec-compliance branch)
#   - one path: tests/golden/baselines/sha256/
#   - bot identity, no PR or release surface
# Combined with workflow_dispatch-only triggering, this is safe for an
# OSS repo. If you ever fork this workflow into a public PR-trigger,
# remove contents:write and have it open a PR instead.

name: Autofill Linux baselines

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to regenerate baselines on (must already exist on origin)"
        required: true
        default: "chore/spec-compliance-gate"

permissions:
  contents: write

jobs:
  fill:
    name: Regenerate Linux deterministic sha256 baselines
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          # fetch-depth: 0 so we can `git push` back without unrelated history
          # truncation issues; checkout's default token has push rights given
          # this workflow's contents: write permission.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install libcairo
        run: sudo apt-get update -y && sudo apt-get install -y libcairo2

      - name: Install package + dev dependencies
        run: pip install -e ".[dev]"

      # Regenerate only the deterministic-sha256 layer. The other 4 layers
      # are cross-platform and already committed; a bulk --update-golden
      # would risk silently rewriting other baselines.
      - name: Regenerate deterministic sha256 baselines
        env:
          PYTHONUTF8: "1"
        run: |
          python -m pytest \
            tests/golden/test_deterministic_sha256.py \
            --update-golden -v

      - name: Detect changes
        id: diff
        run: |
          if [ -n "$(git status --porcelain tests/golden/baselines/sha256/)" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "Files changed:"
            git status --porcelain tests/golden/baselines/sha256/
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No baselines changed — nothing to commit."
          fi

      - name: Commit + push baselines
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add tests/golden/baselines/sha256/
          git commit -m "data(audit): auto-fill Linux deterministic sha256 baselines

          Generated by .github/workflows/autofill-linux-baselines.yml on a
          Linux runner. These baselines are Linux-canonical (sha256 of the
          rendered PDF varies per-OS) so they cannot be produced on macOS
          or Windows dev boxes; this workflow is the bridge.

          Trigger: workflow_dispatch on branch ${{ github.event.inputs.branch }}"
          git push origin HEAD:${{ github.event.inputs.branch }}
