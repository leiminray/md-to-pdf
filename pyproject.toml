[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "md-to-pdf"
version = "2.0.0a1"
description = "Markdown → PDF converter with brand-pack support, watermarking, and CJK fonts"
readme = "README.md"
requires-python = ">=3.10"
license = { text = "Apache-2.0" }
authors = [{ name = "sophie.leiyixiao@gmail.com" }]
keywords = ["markdown", "pdf", "reportlab", "cjk"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.10",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
]
dependencies = [
  "click>=8.1",
  "markdown-it-py>=3.0",
  "pydantic>=2.5",
  "reportlab>=4.0",
  "structlog>=24.1",
]

[project.optional-dependencies]
dev = [
  "mypy>=1.8",
  "pypdf>=4.0",
  "pytest>=8.0",
  "pytest-cov>=4.1",
  "ruff>=0.3",
  "types-reportlab",
]

[project.scripts]
md-to-pdf = "mdpdf.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/mdpdf"]

[tool.pytest.ini_options]
addopts = "-ra --strict-markers"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "N", "S", "C4", "SIM"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py" = ["S"]

[tool.mypy]
strict = true
python_version = "3.10"
files = ["src/mdpdf"]
